<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-danger-subtle d-flex justify-content-center align-items-center vh-100">

    <main class="container">
        <div class="row justify-content-center">

            <div class="col-12 col-sm-8 col-md-6 col-lg-4">

                <div class="card shadow-lg rounded-4 p-4">

                    <h2 id="titulo" class="mb-4 fw-bold text-danger">Login</h2>

                    <form id="form-login">

                    <div class="mb-3 row align-items-center">
                        <label for="email" class="col-4 col-form-label">Email: </label>
                        <div class="col-8">
                            <input type="email" id="email" class="form-control" placeholder="Email" required>
                        </div>
                    </div>
                
                    <div class="mb-3 row align-items-center">
                        <label for="senha" class="col-4 col-form-label">Senha:</label>
                        <div class="col-8">
                            <input type="password" id="senha" class="form-control" placeholder="Senha" required>
                        </div>
                    </div>

                <button id="botao-envio" type="submit">Entrar</button>

            </form>
            
            <div id="mensagem"></div>
            <div class="toggle" id="toggle">
                <p>Não tem uma conta? Cadastre-se</p>
            </div>

    </main>

    <footer>

    </footer>

    <script src="scripts/script.js"></script>
</body>
</html>
